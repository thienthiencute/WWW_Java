<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách hóa đơn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            padding: 30px;
            margin-top: 50px;
        }

        h2 {
            text-align: center;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 25px;
        }

        .btn-home {
            background-color: #6c5ce7;
            color: #fff;
            border-radius: 30px;
            padding: 8px 18px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .btn-home:hover {
            background-color: #4834d4;
            color: #fff;
            transform: translateY(-2px);
        }

        .table {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead {
            background-color: #6c5ce7;
            color: white;
        }

        .table-hover tbody tr:hover {
            background-color: #f1f2f6;
        }

        .form-control {
            display: inline-block;
            width: auto;
        }

        .btn-success {
            background-color: #00b894;
            border: none;
        }

        .btn-success:hover {
            background-color: #019875;
        }

        .btn-primary {
            background-color: #0984e3;
            border: none;
        }

        .btn-primary:hover {
            background-color: #0773c1;
        }

        .btn-info {
            background-color: #74b9ff;
            border: none;
            color: white;
        }

        .btn-danger {
            background-color: #d63031;
            border: none;
        }

        .action-buttons a {
            margin-right: 5px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #555;
            font-size: 0.9rem;
        }
    </style>

</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-receipt"></i> Danh sách Hóa đơn</h2>
        <a th:href="@{/home}" class="btn-home"><i class="bi bi-house-door"></i> Trở về trang chủ</a>
    </div>


    <!-- Nút thêm hóa đơn (chỉ ADMIN) -->
    <div class="mb-3" sec:authorize="hasRole('ADMIN')">
        <a class="btn btn-success" th:href="@{/orders/add}">
            <i class="bi bi-plus-circle"></i> Thêm hóa đơn
        </a>
    </div>

    <!-- Ô tìm kiếm -->
    <form th:action="@{/orders/search/customer}" method="get" class="mb-3 d-flex align-items-center">
        <input type="number" name="customerId" th:value="${customerId}" placeholder="🔍 Tìm theo ID khách hàng"
               class="form-control me-2" style="max-width: 250px"/>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-search"></i> Tìm kiếm
        </button>
    </form>

    <!-- Bảng danh sách hóa đơn -->
    <table class="table table-bordered table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Ngày hóa đơn</th>
            <th>Khách hàng</th>
            <th class="text-center">Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${#dates.format(order.date, 'dd/MM/yyyy')}"></td>
            <td th:text="${order.customer.name}"></td>
            <td class="action-buttons text-center">
                <a th:href="@{/orders/detail/{id}(id=${order.id})}" class="btn btn-info btn-sm">
                    <i class="bi bi-eye"></i> Xem
                </a>
                <a th:href="@{/orders/delete/{id}(id=${order.id})}" class="btn btn-danger btn-sm"
                   sec:authorize="hasRole('ADMIN')"
                   th:onclick="'return confirm(\'Bạn có chắc muốn xóa hóa đơn này?\')'">
                    <i class="bi bi-trash"></i> Xóa
                </a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(orders)}">
            <td colspan="4" class="text-center text-muted">Không có hóa đơn nào được tìm thấy.</td>
        </tr>
        </tbody>
    </table>

    <footer> Order Management Dashboard </footer>

</div>

</body>
</html>
