<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <style>
        .comments {
            margin-top: 10px;
            padding-left: 20px;
        }

        .comment {
            border-left: 3px solid #2a7;
            margin-bottom: 8px;
            padding-left: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
<h1>Product Detail</h1>

<p><strong>Name:</strong> <span th:text="${product.name}"></span></p>
<p><strong>Price:</strong> <span th:text="${product.price}"></span> USD</p>
<p><strong>In Stock:</strong> <span th:text="${product.inStock} ? 'Yes' : 'No'"></span></p>
<p><strong>Category:</strong> <span th:text="${product.category != null ? product.category.name : 'No Category'}"></span></p>

<div class="comments">
    <h3>Comments:</h3>
    <div th:if="${#lists.isEmpty(product.comments)}">
        <p><em>No comments</em></p>
    </div>
    <ul>
        <li th:each="c : ${product.comments}" class="comment">
            <span th:text="${c.text}">Comment text</span> |
            <a th:href="@{'/comments/delete/' + ${c.id} + '?productId=' + ${product.id}}"
               onclick="return confirm('Are you sure you want to delete this comment?')">Delete</a>
        </li>
    </ul>
</div>

<h3>Add Comment</h3>
<form th:action="@{/comments/add}" method="post">
    <input type="hidden" name="productId" th:value="${product.id}"/>
    <textarea name="text" rows="3" cols="40" required></textarea><br>
    <button type="submit">Submit</button>
</form>

<br>
<a href="/product">← Back to Product List</a>
</body>
</html>
